<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso — Control de Visitantes</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-box { width: 100%; max-width: 380px; }
    .login-header { margin-bottom: 24px; }
    .login-header h1 { font-size: 20px; color: var(--text); }
    .login-header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .login-card { padding: 24px; }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 40px; }
    .toggle-pass {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-subtle); cursor: pointer; font-size: 13px; padding: 2px 4px;
    }
    .toggle-pass:hover { color: var(--text-muted); }
    .login-footer { margin-top: 16px; text-align: center; font-size: 12px; color: var(--text-subtle); }
    .login-footer a { color: var(--text-muted); text-decoration: none; }
    .login-footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div id="toast-container" role="region" aria-live="polite"></div>

  <div class="login-box">
    <div class="login-header">
      <h1>Control de Visitantes</h1>
      <p>Oficinas Centrales — CECYTE</p>
    </div>

    <div class="card login-card">
      <div id="login-alert" class="alert alert-error" role="alert" style="margin-bottom: 16px;">
        Credenciales inválidas. Verifica usuario y contraseña.
      </div>

      <form id="login-form" class="login-form" novalidate autocomplete="off">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input id="username" type="text" placeholder="usuario" autocomplete="username" required />
          <span class="field-error" id="username-error">El usuario es obligatorio</span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="pass-wrap">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-pass" id="toggle-pass-btn" aria-label="Mostrar/ocultar contraseña">ver</button>
          </div>
          <span class="field-error" id="password-error">La contraseña es obligatoria</span>
        </div>

        <button id="login-btn" type="submit" class="btn btn-primary btn-full">
          <span class="btn-text">Iniciar sesión</span>
        </button>
      </form>
    </div>

    <p class="login-footer">
      Solo personal autorizado &mdash;
      <a href="/h2-console" target="_blank" rel="noopener">Consola H2</a>
    </p>
  </div>

  <script src="/app.js"></script>
  <script>
    if (localStorage.getItem('jwt_token')) {
      window.location.replace('/recepcion.html');
    }

    const form      = document.getElementById('login-form');
    const btnLogin  = document.getElementById('login-btn');
    const inputUser = document.getElementById('username');
    const inputPass = document.getElementById('password');
    const alertBox  = document.getElementById('login-alert');

    document.getElementById('toggle-pass-btn').addEventListener('click', () => {
      const isText = inputPass.type === 'text';
      inputPass.type = isText ? 'password' : 'text';
      document.getElementById('toggle-pass-btn').textContent = isText ? 'ver' : 'ocultar';
    });

    [inputUser, inputPass].forEach(el => {
      el.addEventListener('input', () => {
        el.classList.remove('error');
        document.getElementById(el.id + '-error').classList.remove('visible');
        alertBox.classList.remove('visible');
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      let valid = true;

      if (!inputUser.value.trim()) {
        inputUser.classList.add('error');
        document.getElementById('username-error').classList.add('visible');
        valid = false;
      }
      if (!inputPass.value.trim()) {
        inputPass.classList.add('error');
        document.getElementById('password-error').classList.add('visible');
        valid = false;
      }
      if (!valid) return;

      btnLogin.disabled = true;
      btnLogin.querySelector('.btn-text').textContent = 'Verificando...';

      try {
        const data = await Api.login(inputUser.value.trim(), inputPass.value);
        if (data.token) {
          localStorage.setItem('jwt_token', data.token);
          localStorage.setItem('user_rol', data.rol);
          localStorage.setItem('username', data.username);
          window.location.replace('/recepcion.html');
        }
      } catch (err) {
        alertBox.classList.add('visible');
        inputPass.value = '';
        inputPass.focus();
      } finally {
        btnLogin.disabled = false;
        btnLogin.querySelector('.btn-text').textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
